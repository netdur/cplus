name: macOS CI

# Runs the full `cargo test --workspace` suite on macOS / Apple Silicon. Unlike
# ci-linux.yml / ci-windows.yml (tag-only), this fires on push-to-main and on
# PRs — that's the point of it: catch the macOS regressions *during* development
# that a tag-only CI would only surface at release. (The Linux and Windows ports
# each regressed a macOS fixture that only a local run caught.)
#
# cpc emits IR that needs clang/LLVM >= 19 (e.g. the `preserve_nonecc` calling
# convention + newer struct-ABI IR). The macos-14 runner's *default* Apple clang
# is 15, which rejects that IR, so — exactly like Linux (clang-19) and Windows
# (choco llvm) — we install a recent LLVM via Homebrew and point cpc at it through
# `$CPC_CLANG`. `SDKROOT` lets the Homebrew clang find the macOS SDK when it links.
#
# We use Homebrew `llvm` (latest), NOT `llvm@19`: the pinned `llvm@19` (19.1.7)
# anomalously rejects the `writable` sret parameter attribute cpc emits, even
# though that attribute is valid at our LLVM-19 minimum (Linux clang-19 and the
# Windows toolchain both accept it). The latest formula parses it correctly.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: cargo test --workspace (macOS, Homebrew clang)
    runs-on: macos-14 # Apple Silicon (arm64)
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install LLVM (latest, >= 19) via Homebrew
        run: |
          set -euo pipefail
          brew install llvm
          PFX="$(brew --prefix llvm)"
          echo "CPC_CLANG=$PFX/bin/clang" >> "$GITHUB_ENV"
          # Homebrew clang links via the system ld64 but needs the SDK path.
          echo "SDKROOT=$(xcrun --show-sdk-path)" >> "$GITHUB_ENV"

      - name: Versions
        run: |
          "$CPC_CLANG" --version | head -1
          rustc --version
          echo "SDKROOT=$SDKROOT"

      - name: Run the workspace test suite
        run: cargo test --workspace --no-fail-fast
