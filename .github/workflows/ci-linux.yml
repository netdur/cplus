name: Linux CI

# Triggers on a vX.Y.Z release tag (same model as release.yml) plus manual
# dispatch — not on every push/PR. On a tag it runs the full `cargo test
# --workspace` suite on Ubuntu (the project's first test-running CI — catches
# the cross-platform regressions local macOS runs miss), then packages a .deb
# and apt-installs + smoke-tests it so the `Depends:` line is exercised end to
# end.
#
# cpc discovers a clang >= 19 itself (it probes clang / clang-21 / clang-20 /
# clang-19, honoring $CPC_CLANG), so installing clang-19 is enough — no
# update-alternatives. Ubuntu 24.04's bare `clang` is still 18, which lacks the
# `preserve_nonecc` calling convention cpc emits.

on:
  # RE-ENABLED 2026-06-22: Linux CI is green, so it runs on a vX.Y.Z release tag
  # again (builds the .deb and attaches it to the GitHub Release), plus manual
  # dispatch. (ci-windows.yml is now tag-enabled too, as of 2026-06-23, after
  # its Win64 ABI gaps cleared.)
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # create the Release and upload the .deb asset

jobs:
  test:
    name: cargo test --workspace (Ubuntu, clang-19)
    runs-on: ubuntu-latest # currently Ubuntu 24.04 (amd64)
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install clang-19
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-19
          clang-19 --version | head -1

      - name: Run the workspace test suite
        run: cargo test --workspace --no-fail-fast

  build-deb:
    name: Build + apt-install + smoke-test the .deb
    runs-on: ubuntu-latest # currently Ubuntu 24.04 (amd64)
    needs: test
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release -p cpc -p cpc-lsp -p cpc-bindgen

      - name: Stage and build the .deb
        id: deb
        run: |
          set -euo pipefail
          # Upstream version from the cpc crate; append a git short SHA so dev
          # builds get unique, sortable versions.
          UPSTREAM="$(sed -n 's/^version *= *"\(.*\)"/\1/p' cpc/Cargo.toml | head -1)"
          SHA="$(git rev-parse --short=7 HEAD)"
          VER="${UPSTREAM}~git${SHA}-1"
          PKG="cplus_${VER}_amd64"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "pkg=$PKG"     >> "$GITHUB_OUTPUT"

          # Lay out the package tree.
          ROOT="dist/${PKG}"
          install -d "$ROOT/DEBIAN" "$ROOT/usr/bin"
          for b in cpc cpc-lsp cpc-bindgen; do
            install -m0755 "target/release/$b" "$ROOT/usr/bin/$b"
            strip "$ROOT/usr/bin/$b" || true
          done

          cat > "$ROOT/DEBIAN/control" <<EOF
          Package: cplus
          Version: ${VER}
          Section: devel
          Priority: optional
          Architecture: amd64
          Depends: clang-19, binutils
          Maintainer: netdur <netdur@gmail.com>
          Homepage: https://cplus-lang.dev
          Description: C+ programming language toolchain
           The C+ compiler (cpc), language server (cpc-lsp), and FFI binding
           generator (cpc-bindgen). cpc emits LLVM IR and links via clang;
           requires clang/LLVM 19 or newer.
          EOF

          dpkg-deb --root-owner-group --build "$ROOT"
          ls -l dist/*.deb
          dpkg-deb --info "dist/${PKG}.deb"
          dpkg-deb --contents "dist/${PKG}.deb"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.deb.outputs.pkg }}
          path: dist/*.deb
          if-no-files-found: error
          # Cap accumulation against the account storage quota; the durable copy
          # is attached to the GitHub Release on a tag.
          retention-days: 14

      - name: Attach the .deb to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          # Idempotent across the parallel release jobs (macOS/Linux/Windows all
          # fire on the same tag): create if absent, then clobber-upload.
          gh release create "$TAG" --title "$TAG" --notes "Prebuilt binaries for $TAG." || true
          gh release upload "$TAG" dist/*.deb --clobber

      - name: Install the .deb via apt (resolves Depends, incl. clang-19)
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y "./dist/${{ steps.deb.outputs.pkg }}.deb"
          # Intentionally NOT setting update-alternatives: prove cpc finds
          # clang-19 itself even though the bare `clang` here is 18.
          echo "bare clang: $(clang --version | head -1)"
          command -v cpc cpc-lsp cpc-bindgen

      - name: Smoke-test the installed cpc on a clean runner
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          cat > "$tmp/hello.cplus" <<'EOF'
          extern fn printf(fmt: *u8, ...) -> i32;
          fn main() -> i32 {
              let msg: str = "hello from C+ on Linux\n";
              { printf(#str_ptr(msg)); }
              return 42;
          }
          EOF
          cpc "$tmp/hello.cplus" -o "$tmp/hello"
          set +e
          "$tmp/hello"
          code=$?
          set -e
          echo "exit code: $code"
          test "$code" -eq 42
          echo "OK: installed cpc compiled, linked, and ran a native binary."
