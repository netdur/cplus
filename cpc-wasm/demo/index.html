<!DOCTYPE html>
<!--
  C+ web playground — RUN demo (plans/plan.wasm-playground.md, task T7).

  Fully client-side, zero infra: the cpc-wasm blob compiles C+ to WebAssembly
  AND assembles it to bytes in-process (`cplus_run`), so this page only has to
  instantiate the result with one host import. No server, no wat2wasm download.

  Build the pkg first (see ../README.md):
    wasm-pack build cpc-wasm --target web --release
  then serve this folder over http (modules need it), e.g.:
    python3 -m http.server   # from the repo root, open /cpc-wasm/demo/
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>C+ playground — run (slice)</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 14px/1.5 system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.25rem; }
  textarea { width: 100%; height: 12rem; font: 13px/1.45 ui-monospace, monospace; padding: .6rem; box-sizing: border-box; }
  button { font-size: 1rem; padding: .45rem 1.1rem; margin: .6rem 0; cursor: pointer; }
  .out { white-space: pre-wrap; font: 13px/1.45 ui-monospace, monospace; padding: .6rem .8rem; border-left: 4px solid #888; background: rgba(128,128,128,.08); }
  /* High-contrast status colors (blue / orange), never color alone — each row
     is also prefixed with an explicit text tag. */
  .ok    { border-left-color: #1f6feb; }
  .err   { border-left-color: #e8731a; }
  .tag   { font-weight: 700; }
  .tag.ok  { color: #1f6feb; }
  .tag.err { color: #e8731a; }
  details { margin-top: 1rem; }
</style>
</head>
<body>
  <h1>C+ playground — run <small>(i32 slice)</small></h1>
  <p>Runs entirely in your browser. The runnable subset is the i32 core
     (arithmetic, <code>if</code>/<code>while</code>/<code>loop</code>,
     <code>#println</code>); richer programs report a diagnostic.</p>

  <textarea id="src" spellcheck="false">fn main() -> i32 {
    var i: i32 = 0;
    while i &lt; 3 {
        #println(i);
        i = i +% 1;
    }
    return 0;
}</textarea>

  <button id="run" disabled>Run</button>
  <span id="ver"></span>

  <div id="result"></div>
  <details>
    <summary>Generated WebAssembly text</summary>
    <pre id="wat" class="out"></pre>
  </details>

<script type="module">
  import init, { cplus_run, cplus_version } from "../pkg/cpc_wasm.js";

  const $ = (id) => document.getElementById(id);
  const result = $("result"), watBox = $("wat");

  function show(html) { result.innerHTML = html; }
  function esc(s) { return s.replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }

  await init();
  $("ver").textContent = "cpc " + cplus_version();
  $("run").disabled = false;

  $("run").addEventListener("click", async () => {
    watBox.textContent = "";
    const res = JSON.parse(cplus_run($("src").value));

    if (!res.ok) {
      const lines = res.diagnostics.map(d =>
        `${d.severity}[${d.code}] ${d.primary.start.line}:${d.primary.start.col}: ${d.message}`);
      show(`<div class="out err"><span class="tag err">did not run</span>\n${esc(lines.join("\n"))}</div>`);
      return;
    }

    watBox.textContent = res.wat || "";

    // `res.wasm` is the assembled module bytes — instantiate directly.
    const bytes = new Uint8Array(res.wasm);
    const printed = [];
    const { instance } = await WebAssembly.instantiate(bytes, {
      env: { println_i32: (n) => printed.push(String(n)) },
    });
    const ret = instance.exports.main();
    const body = printed.join("\n") + (printed.length ? "\n" : "");
    show(`<div class="out ok"><span class="tag ok">output</span>\n${esc(body)}<span style="opacity:.6">main returned ${ret}</span></div>`);
  });
</script>
</body>
</html>
