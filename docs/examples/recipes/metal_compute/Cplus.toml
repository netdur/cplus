[package]
name    = "metal_compute"
version = "0.0.1"
edition = "2026"

# v0.0.7 Phase 4.1: dropped the `--emit-ll | clang` two-step in favor of
# plain `cpc build`. The `[[bin]]` section's `frameworks` + `libs` are
# expanded into `-framework <name>` / `-l<name>` link args by cpc (same
# path appkit_hello validated).
[[bin]]
name       = "metal_compute"
path       = "src/main.cplus"
frameworks = ["Metal", "Foundation"]
libs       = ["objc"]
