[[code]]
id = "E1000"
title = "Missing stdlib type for `gen fn` / `Iterator::next`"
category = "Compile-time builtins"
severity = "error"
repro = "source"
lang = "cplus"
verified = false
emit_site = "cplus-core/src/sema.rs:3390"
cause = "A `gen fn` was used without `Iterator[T]` from `stdlib/iterator` in scope (or `Iterator::next` was reached without `Option[T]` from `stdlib/option`), so the compiler cannot synthesize the iterator/option type."
fix = "Add `import \"stdlib/iterator\"` (and `import \"stdlib/option\"`) so the required generic types are available."
example = '''
gen fn count_up(n: i32) -> i32 {
    let mut i: i32 = 1;
    while i <= n { yield i; i = i +% (1 as i32); }
    return;
}
fn main() -> i32 { return 0; }
// fails when `import "stdlib/iterator"` is absent
'''

