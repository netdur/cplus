[[code]]
id = "W0001"
title = "`sum()` / `product()` over narrow integer SIMD lanes silently wraps"
category = "Warnings"
severity = "warning"
repro = "checked"
lang = "cplus"
verified = true
emit_site = "cplus-core/src/sema.rs:10191"
test = "cpc/tests/e2e.rs:simd_narrow_int_sum_warns_but_compiles"
cause = "A horizontal `sum()` or `product()` over integer SIMD lanes narrower than 32 bits returns that same narrow lane type, which cannot hold the reduction of more than a couple of near-max lanes, so the result silently wraps."
fix = "`.widen()` the lanes first, or use [`simd/integer::dot_i32`](/docs/packages/simd)."
example = '''
fn main() -> i32 {
    let a: i8x16 = i8x16::splat(50i8);
    let prod: i8x16 = a.mul(i8x16::splat(50i8));
    return prod.sum() as i32;
}
// -> W0001 `sum` over narrow integer lanes (`i8x16`) silently wraps
'''

[[code]]
id = "W0002"
title = "Conditionally-freed raw-pointer field in a `Drop` type"
category = "Warnings"
severity = "warning"
repro = "checked"
lang = "cplus"
verified = false
emit_site = "cplus-core/src/sema.rs:4429"
cause = "A raw-pointer field in a `Drop` type is freed inside `drop` only under some condition, so the compiler cannot prove the release always runs on every owning path."
fix = "Confirm it frees on every owning path (expected for refcounted types)."
example = '''
struct Cell { p: *u8 }
impl Drop for Cell {
    fn drop(self) {
        if some_condition() { free(self.p); }  // freed only conditionally
    }
}
// -> W0002 raw-pointer field `p` is freed only conditionally in `drop`
'''

[[code]]
id = "W0003"
title = "`[[bin]]` `[link]` libs / frameworks ignored"
category = "Warnings"
severity = "warning"
repro = "scenario"
lang = "toml"
verified = true
emit_site = "cpc/src/main.rs:1654"
test = "cpc/tests/e2e.rs:bin_package_link_libs_warns_w0003"
cause = "A `[[bin]]` package declares its own top-level `[link]` `libs` / `frameworks`, but those are read only when a package is a dependency of another — a `[[bin]]` is never a dependency, so they are ignored when building the binary."
fix = "Move them under `[[bin]]` `libs` / `frameworks` (top-level `[link]` libs apply only when the package is a dependency)."
example = '''
[package]
name = "app"
[[bin]]
name = "app"
path = "src/main.cplus"
[link]
libs = ["boguslib"]
# -> W0003 `[link] libs` on a `[[bin]]` package is ignored when building the binary
'''
