[package]
name    = "adwaita"
version = "0.0.1"
edition = "2026"

# C+ bindings for libadwaita 1 — GNOME's companion library to GTK 4 (adaptive
# widgets, the GNOME HIG look, app recoloring / dark mode). A thin layer *on
# top of* `vendor/gtk`: every Adwaita object is a GObject, so these bindings
# reuse gtk's `Widget`/`Box`/`Button`/… through raw pointers and only add the
# `Adw*` widgets. `AdwApplication` ⊂ `GtkApplication`, `AdwApplicationWindow` ⊂
# `GtkApplicationWindow`, so the two compose seamlessly.
#
# Kept a SEPARATE package (not folded into `vendor/gtk`) because libadwaita is
# its own shared library and an optional, opinionated layer — a pure-GTK app on
# a non-GNOME desktop should not be forced to link it. Install `libadwaita-1-dev`
# (Debian/Ubuntu) for the pkg-config file and `.so` link symlinks.
#
# `libadwaita-1` lands on the consumer's link line; the GTK stack comes
# transitively through the `gtk` dependency.
[link]
libs = ["adwaita-1"]

[dependencies]
gtk    = "*"
stdlib = "*"
