[package]
name    = "agent_win32"
version = "0.0.1"
edition = "2026"

# The Win32 backend for the agent surface — the Windows counterpart to
# `vendor/agent_appkit` (AppKit). Walks a live HWND hierarchy into the
# agent-core identity tree and emits a `describe_ui` snapshot, then gates
# click / set_text / focus through agent-core's authorization brain. Depends on
# agent_core (the headless, framework-neutral id/role/surface model); the live
# introspection uses plain user32 `extern fn` calls (GetClassNameA / GetWindow /
# GetWindowTextA / …), so no GUI-toolkit package is required.
[dependencies]
stdlib     = "*"
agent_core = "*"

# user32 supplies the window-introspection + messaging calls; it ships with
# Windows and is on the linker's default search path.
[link]
libs = ["user32"]
