[package]
name    = "agent_gtk"
version = "0.0.1"
edition = "2026"

# The GTK 4 backend for the agent surface — the Linux/BSD counterpart to
# `vendor/agent_appkit` (AppKit) and `vendor/agent_win32` (Win32). Walks a live
# GtkWidget hierarchy into the agent-core identity tree and emits a `describe_ui`
# snapshot, then gates click / set_text / focus through agent-core's
# authorization brain. Depends on agent_core (the headless, framework-neutral
# id/role/surface model); the live introspection uses plain GTK/GObject C calls
# (gtk_widget_get_first_child / g_type_name_from_instance / gtk_editable_get_text
# / …) and `gtk/convert` for the str↔char* bridges.
[dependencies]
stdlib     = "*"
gtk        = "*"
agent_core = "*"

# The same GTK 4 stack `vendor/gtk` links — agent_gtk calls `gtk_*` / `g_*`
# symbols directly. On Debian/Ubuntu install `libgtk-4-dev`. The loader resolves
# pango/cairo/graphene/… transitively from their NEEDED entries.
[link]
libs = ["gtk-4", "gobject-2.0", "gio-2.0", "glib-2.0"]
