[package]
name    = "agent_appkit"
version = "0.0.1"
edition = "2026"

# The AppKit backend for the agent surface (Theme B / Iris GAP 1): walk a live
# NSView hierarchy into the agent-core identity tree and emit a describe_ui
# snapshot. Depends on appkit (the live widgets) + agent_core (the headless
# id/role/tree model).
[dependencies]
stdlib     = "*"
objc       = "*"
appkit     = "*"
agent_core = "*"
